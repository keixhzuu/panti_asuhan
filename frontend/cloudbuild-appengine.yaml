steps:
  - name: 'gcr.io/cloud-builders/npm'
    args: ['install']
    dir: 'frontend'

  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'build']
    dir: 'frontend'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail

        # Deploy to App Engine in the build project
        gcloud app deploy frontend/app.yaml --project=${PROJECT_ID} --quiet

timeout: '1200s'
