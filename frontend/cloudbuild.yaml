substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: donasi-panti-backend # Pastikan ini sama persis dengan nama service backend-mu di Cloud Run

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'

steps:
  # ==========================================
  # STEP 1: Install Dependencies Frontend
  # ==========================================
  - name: 'gcr.io/cloud-builders/npm'
    args: ['install']
    dir: 'frontend'

  # ==========================================
  # STEP 2: Ambil URL Backend & Build Frontend
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    dir: 'frontend'
    args:
      - '-c'
      - |
        set -euo pipefail
        
        echo "Mengambil URL dari Cloud Run service: ${_BACKEND_SERVICE}..."
        BACKEND_URL=$(gcloud run services describe ${_BACKEND_SERVICE} --region ${_REGION} --format='value(status.url)')
        
        if [[ -z "$BACKEND_URL" ]]; then
          echo "Error: URL Backend tidak ditemukan di Cloud Run!"
          exit 1
        fi
        
        echo "URL Backend ditemukan: $BACKEND_URL"
        
        # Menyuntikkan URL backend ke environment variable Vite sebelum di-build
        VITE_API_BASE_URL=$BACKEND_URL npm run build

  # ==========================================
  # STEP 3: Deploy Folder Dist ke App Engine
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    dir: 'frontend'
    args:
      - '-c'
      - |
        set -euo pipefail
        gcloud app deploy app.yaml --project=${PROJECT_ID} --quiet