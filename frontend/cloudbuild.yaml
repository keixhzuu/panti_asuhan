steps:
  - name: 'gcr.io/cloud-builders/npm'
    args: ['install']
    dir: 'frontend'

  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'build']
    dir: 'frontend'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        gcloud app deploy app.yaml --project=${PROJECT_ID} --quiet
    dir: 'frontend'

timeout: '1200s'
