substitutions:
  _REGION: asia-southeast2
  _BACKEND_SERVICE: donasi-panti-backend
  _ARTIFACT_REGISTRY: asia-southeast2-docker.pkg.dev
  _REPO: donasi-panti
  _PROJECT_ID: $PROJECT_ID
  _GCS_BUCKET_NAME: projek-tcc-donasi-panti
  _DATABASE_URL: ''

steps:
  - name: gcr.io/cloud-builders/docker
    dir: backend
    args:
      - build
      - -t
      - ${_ARTIFACT_REGISTRY}/${_PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_ARTIFACT_REGISTRY}/${_PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [[ -z "${_DATABASE_URL}" ]]; then
          echo "Missing _DATABASE_URL substitution. Set it in the Cloud Build trigger or submit command."
          exit 1
        fi

        gcloud run deploy ${_BACKEND_SERVICE} \
          --image ${_ARTIFACT_REGISTRY}/${_PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars NODE_ENV=production,GCP_PROJECT_ID=${_PROJECT_ID},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},CORS_ORIGIN=https://donasi-panti-frontend-dot-${_PROJECT_ID}.et.r.appspot.com,DATABASE_URL=${_DATABASE_URL}

images:
  - ${_ARTIFACT_REGISTRY}/${_PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA
