substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: panti-asuhan-backend
  _REPO: donasi-panti-asuhan
  _GCS_BUCKET_NAME: projek-tcc-donasi-panti

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # =========================
  # BUILD IMAGE
  # =========================
  - name: gcr.io/cloud-builders/docker
    dir: backend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA
      - .

  # =========================
  # PUSH IMAGE (DITAMBAHKAN dir: backend)
  # =========================
  - name: gcr.io/cloud-builders/docker
    dir: backend
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA

  # =========================
  # DEPLOY TO CLOUD RUN (DITAMBAHKAN dir: backend)
  # =========================
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    dir: backend
    entrypoint: bash
    secretEnv:
      - DATABASE_URL
    args:
      - -c
      - |
        set -euo pipefail

        if [[ -z "$$DATABASE_URL" ]]; then
          echo "Missing DATABASE_URL secret in Secret Manager."
          exit 1
        fi

        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA"

        gcloud run deploy ${_BACKEND_SERVICE} \
          --image "$$IMAGE" \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "NODE_ENV=production,GCP_PROJECT_ID=${PROJECT_ID},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},DATABASE_URL=$$DATABASE_URL"

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA