substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: donasi-panti-backend
  _REPO: donasi-panti
  _GCS_BUCKET_NAME: projek-tcc-donasi-panti

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # =========================
  # BUILD IMAGE
  # =========================
  - name: gcr.io/cloud-builders/docker
    dir: backend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA
      - .

  # =========================
  # PUSH IMAGE
  # =========================
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA

  # =========================
  # DEPLOY TO CLOUD RUN
  # =========================
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA"

        gcloud run deploy ${_BACKEND_SERVICE} \
          --image "$$IMAGE" \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "NODE_ENV=production,GCP_PROJECT_ID=${PROJECT_ID},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME}"

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_BACKEND_SERVICE}:$SHORT_SHA